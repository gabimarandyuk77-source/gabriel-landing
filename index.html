<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabriel Marandyuk | Tu crées. On distribue.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0A0A0A; color: #FFFFFF; }
        .nike-title { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; line-height: 0.85; }
        .btn-nike { transition: all 0.2s ease-in-out; border-radius: 0px; }
        .btn-nike:hover { transform: scale(1.05); background-color: #FFFFFF; color: #000000; }
    </style>
</head>
<body>
    <section class="h-screen flex flex-col justify-center items-center text-center px-4">
        <h1 class="nike-title text-6xl md:text-9xl mb-6">
            TU CRÉES.<br><span class="text-[#CC0000]">ON DISTRIBUE.</span><br>TU GRANDIS.
        </h1>
        <p class="text-gray-400 text-lg md:text-2xl max-w-2xl mb-10">
            Gabriel Marandyuk transforme ton contenu long en clips viraux.
        </p>
        <button class="btn-nike bg-[#CC0000] text-white text-xl font-black py-5 px-12 uppercase">
            À la source →
        </button>
    </section>
</body>
</html>
